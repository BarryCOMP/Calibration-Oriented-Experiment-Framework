version: "v1"
run_name: "pd_profile_compare"
seed: 1
output_root: "experiments/runs"

global:
  model_path: "LLM-Research/Meta-Llama-3.1-8B-Instruct"
  tokenizer_path: null
  use_modelscope: true
  python_bin: "python3"
  nsys_bin: "nsys"

matrix:
  scenario: ["pd"]
  mode: ["baseline", "torch_prefill", "torch_decode", "nsys_prefill", "nsys_decode"]
  dataset_name: ["random"]
  num_prompts: [20]
  random_input_len: [256]
  random_output_len: [128]
  random_range_ratio: [0.0]
  pd_host: ["127.0.0.1"]
  pd_prefill_port: [30000]
  pd_decode_port: [30001]
  pd_router_port: [8000]
  pd_prefill_cuda_devices: ["0"]
  pd_decode_cuda_devices: ["1"]
  pd_disaggregation_transfer_backend: ["mooncake"]
  pd_disaggregation_ib_device: [""]
  pd_disable_radix_cache: [true]
  pd_disable_cuda_graph: [true]
  pd_request_rate: [inf]
  pd_warmup_requests: [1]
  pd_nsys_capture_range: [true]
  pd_nsys_trigger_start_step: [5]
  pd_nsys_trigger_steps: [40]
  runs_per_case: 1

constraints:
  max_parallel_cases: 1
  timeout_sec_per_case: 3600
  retry:
    max_attempts: 1
    backoff_sec: 0

profiling:
  torch:
    activities: ["GPU"]
    start_step: 5
    steps: 40
  nsys:
    trace: "cuda,nvtx"
    sample: "none"
    cpuctxsw: "none"
    delay_sec: 0
    duration_sec: 0
